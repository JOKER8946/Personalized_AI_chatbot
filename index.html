<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personalized AI Chatbot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-100 flex flex-col md:flex-row h-screen antialiased text-slate-800">

    <!-- Sidebar -->
    <aside class="w-full md:w-80 bg-white shadow-xl border-r border-slate-200 flex flex-col">
        <div class="p-6 border-b border-slate-100 bg-slate-50">
            <h1 class="text-xl font-bold text-slate-900">AI Personalization</h1>
            <p class="text-sm text-slate-500 mt-1">Customize how your bot talks to you.</p>
        </div>
        
        <div class="flex-1 overflow-y-auto p-6 space-y-6">
            <!-- Name Input -->
            <div class="space-y-2">
                <label for="userName" class="block text-sm font-semibold text-slate-700">Your Name</label>
                <input type="text" id="userName" placeholder="What should I call you?" 
                    class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
            </div>

            <!-- Hobbies Input -->
            <div class="space-y-2">
                <label for="userHobbies" class="block text-sm font-semibold text-slate-700">Your Interests/Hobbies</label>
                <textarea id="userHobbies" placeholder="e.g. Cooking, Gaming, Coding..." rows="3"
                    class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all resize-none"></textarea>
            </div>

            <!-- Tone Selector -->
            <div class="space-y-2">
                <label for="botTone" class="block text-sm font-semibold text-slate-700">Bot Personality</label>
                <select id="botTone" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all bg-white">
                    <option value="friendly and helpful">Friendly & Helpful</option>
                    <option value="professional and concise">Professional & Concise</option>
                    <option value="sarcastic and witty">Sarcastic & Witty</option>
                    <option value="highly encouraging">Highly Encouraging</option>
                    <option value="mysterious and philosophical">Mysterious & Philosophical</option>
                </select>
            </div>

            <button id="saveProfile" class="w-full bg-indigo-600 text-white font-semibold py-3 rounded-lg hover:bg-indigo-700 transition-colors shadow-md active:scale-95 duration-75">
                Save Preferences
            </button>
            
            <p id="saveStatus" class="text-center text-sm font-medium h-5 opacity-0 transition-opacity"></p>
        </div>

        <div class="p-4 border-t border-slate-100">
            <button id="clearChat" class="w-full flex items-center justify-center gap-2 text-slate-500 hover:text-red-600 py-2 transition-colors text-sm font-medium">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
                Clear History
            </button>
        </div>
    </aside>

    <!-- Chat Area -->
    <main class="flex-1 flex flex-col min-h-0 bg-white relative">
        <!-- Header -->
        <header class="h-16 border-b border-slate-100 flex items-center justify-between px-6 bg-white z-10">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600 font-bold">AI</div>
                <div>
                    <h2 id="chatHeader" class="font-bold text-slate-800">Chatting with Your Personalized AI</h2>
                    <div class="flex items-center gap-1.5">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                        <span class="text-xs text-slate-400 font-medium">Online</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Messages Container -->
        <div id="chat-container" class="flex-1 overflow-y-auto p-6 space-y-4">
            <!-- Welcome Message -->
            <div class="bot-message flex gap-3 max-w-[85%]">
                <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-xs font-bold text-slate-500 flex-shrink-0">AI</div>
                <div class="bg-slate-100 p-4 rounded-2xl rounded-tl-none text-slate-700 leading-relaxed shadow-sm">
                    Hello there! I'm your personalized AI assistant. Update your preferences in the sidebar so I can get to know you better!
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-6 border-t border-slate-100 bg-slate-50">
            <div class="max-w-4xl mx-auto flex gap-4">
                <div class="flex-1 relative">
                    <input type="text" id="userInput" placeholder="Type your message here..." 
                        class="w-full pl-4 pr-12 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all shadow-sm">
                </div>
                <button id="sendMessage" class="bg-indigo-600 text-white p-3 rounded-xl hover:bg-indigo-700 transition-colors shadow-md active:scale-95 flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 transform rotate-90" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                    </svg>
                </button>
            </div>
            <p class="text-center text-[10px] text-slate-400 mt-3 font-medium tracking-wider uppercase">Powered by Gemini AI</p>
        </div>
    </main>

    <script src="apikey.js"></script>
    <script src="script.js"></script>
</body>
</html>
